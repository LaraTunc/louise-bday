<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Birthday Verification System</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #ffe6f0;
            padding-top: 100px;
        }

        button {
            font-size: 18px;
            padding: 10px 20px;
            margin: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        #startBtn {
            background: #ff4da6;
            color: white;
        }

        #confirmArea button {
            background: #ff8ac6;
        }
    </style>
</head>

<body>

    <div id="app">

        <h1>🎂 Birthday Verification System</h1>
        <p>We have received notification that today is the birthday of Louise Mathilde Delphine Juliette Jeanne Laurinda
            Simone Gizard.</p>
        <p>Verification required before birthday can begin.</p>

        <button id="startBtn" onclick="startProcess()">START PROCESS</button>

    </div>

    <script>

        function startProcess() {

            document.getElementById("app").innerHTML = `
    <h1>Birthday Verification</h1>
    
    <p>Please confirm that you are currently having a birthday.</p>
    
    <div id="checkboxArea" style="position:relative; height:400px;"></div>
    
    <p id="instruction">Check the birthday confirmation box.</p>
    `;

            spawnCheckbox();

        }

        let escapeCount = 0;
        const maxEscapes = 7;

        function spawnCheckbox() {

            const area = document.getElementById("checkboxArea");

            const wrapper = document.createElement("div");
            wrapper.style.position = "absolute";

            /* start in the middle */
            wrapper.style.left = "50%";
            wrapper.style.top = "50%";
            wrapper.style.transform = "translate(-50%, -50%)";

            const box = document.createElement("input");
            box.type = "checkbox";

            box.onmouseover = function () {

                if (escapeCount < maxEscapes) {

                    escapeCount++;

                    /* move to random place using % */
                    wrapper.style.left = Math.random() * 80 + "%";
                    wrapper.style.top = Math.random() * 80 + "%";

                    wrapper.style.transform = "translate(0,0)";

                }

            };

            box.onclick = function () {

                document.getElementById("instruction").innerHTML =
                    "✔ Birthday confirmed.";

                setTimeout(showSuccess, 1000);

            };

            wrapper.appendChild(box);
            wrapper.append(" I certify that today is my birthday");

            area.appendChild(wrapper);

        }

        function showSuccess() {

            document.body.innerHTML = `
<h1>✔ BIRTHDAY CONFIRMED</h1>

<h2>🎉 HAPPY BIRTHDAY DEAR 🎉</h2>

<p>Hope you found this funny and I hope you have an amazing birthday today :)</p>

<canvas id="confetti"></canvas>
`;

            startConfetti();

        }

        function startConfetti() {

            const canvas = document.getElementById("confetti");
            const ctx = canvas.getContext("2d");

            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            let pieces = [];

            for (let i = 0; i < 120; i++) {
                pieces.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    r: Math.random() * 6 + 2,
                    d: Math.random() * 50
                });
            }

            function draw() {

                ctx.clearRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = "pink";

                for (let i = 0; i < pieces.length; i++) {
                    let p = pieces[i];

                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2, true);
                    ctx.fill();

                    p.y += 2;

                    if (p.y > canvas.height) {
                        p.y = 0;
                    }
                }

                requestAnimationFrame(draw);
            }

            draw();

        }

    </script>

</body>

</html>
